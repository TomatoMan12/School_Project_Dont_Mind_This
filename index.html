<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kvízovač - Školní projekt</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .hidden { display: none !important; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .upload-area { border: 2px dashed #3b82f6; padding: 30px; text-align: center; border-radius: 10px; background: #eff6ff; cursor: pointer; margin-top: 20px; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2563eb; }
        #output { margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; line-height: 1.6; }
        .status { text-align: center; margin: 15px 0; font-weight: bold; color: #64748b; }
        .error { color: #ef4444; background: #fef2f2; padding: 10px; border-radius: 5px; margin-top: 10px; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-box">
        <h2 style="text-align: center; margin-top: 0;">🔑 Aktivace aplikace</h2>
        <p>Aplikace využívá AI modely přes OpenRouter. Pro spuštění vložte svůj API klíč:</p>
        <input type="text" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off">
        <button id="saveKeyBtn">Spustit aplikaci</button>
        <p style="font-size: 0.85em; color: #666; text-align: center; margin-top: 15px;">
            Klíč se uloží pouze ve vašem prohlížeči (LocalStorage).
        </p>
    </div>

    <div id="app-box" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <h2 style="margin: 0;">🧠 AI Kvízovač</h2>
            <button id="resetBtn" style="width: auto; padding: 5px 12px; margin: 0; font-size: 12px; background: #64748b;">Změnit klíč</button>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p id="fileNameDisplay">📁 Klikněte pro nahrání dokumentu<br><small>(PDF, DOCX, PPTX)</small></p>
            <input type="file" id="fileInput" accept=".pdf,.docx,.pptx" style="display:none">
        </div>

        <button id="generateBtn">Vytvořit kvíz pomocí AI</button>
        
        <div id="status" class="status"></div>
        <div id="output" class="hidden"></div>
    </div>
</div>

<script>
    // --- INICIALIZACE ---
    const setupBox = document.getElementById('setup-box');
    const appBox = document.getElementById('app-box');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    
    let API_KEY = localStorage.getItem('openrouter_key');

    // Funkce pro přepnutí pohledu
    function refreshUI() {
        if (API_KEY && API_KEY.startsWith('sk-or-')) {
            setupBox.classList.add('hidden');
            appBox.classList.remove('hidden');
        } else {
            setupBox.classList.remove('hidden');
            appBox.classList.add('hidden');
        }
    }
    refreshUI();

    // Uložení klíče
    document.getElementById('saveKeyBtn').onclick = () => {
        const key = apiKeyInput.value.trim();
        if (key.includes('sk-or-')) {
            localStorage.setItem('openrouter_key', key);
            API_KEY = key;
            refreshUI();
        } else {
            alert("Prosím vložte platný OpenRouter API klíč (začínající sk-or-).");
        }
    };

    // Reset klíče
    document.getElementById('resetBtn').onclick = () => {
        localStorage.removeItem('openrouter_key');
        location.reload();
    };

    // Zobrazení názvu souboru
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) document.getElementById('fileNameDisplay').innerHTML = `✅ Vybráno: <strong>${file.name}</strong>`;
    };

    // --- EXTRAKCE TEXTU ---
    async function extractText(file) {
        const arrayBuffer = await file.arrayBuffer();
        
        if (file.name.endsWith('.docx')) {
            const res = await mammoth.extractRawText({ arrayBuffer });
            return res.value;
        } 
        
        if (file.name.endsWith('.pdf')) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(' ') + " ";
            }
            return text;
        }

        if (file.name.endsWith('.pptx')) {
            const zip = await JSZip.loadAsync(arrayBuffer);
            let text = "";
            const slides = Object.keys(zip.files).filter(n => n.startsWith("ppt/slides/slide") && n.endsWith(".xml"));
            for (const s of slides) {
                const content = await zip.file(s).async("string");
                const nodes = new DOMParser().parseFromString(content, "text/xml").getElementsByTagName("a:t");
                for (let n of nodes) text += n.textContent + " ";
            }
            return text;
        }
        return "";
    }

    // --- GENEROVÁNÍ ---
    document.getElementById('generateBtn').onclick = async () => {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Nejdříve vyberte soubor!");

        const genBtn = document.getElementById('generateBtn');
        genBtn.disabled = true;
        status.innerHTML = "⌛ Čtu dokument a kontaktuji AI...";
        output.classList.add('hidden');

        try {
            const documentText = await extractText(file);
            if (!documentText.trim()) throw new Error("Ze souboru se nepodařilo přečíst žádný text.");

            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "google/gemini-2.0-flash-exp:free",
                    "messages": [{
                        "role": "user",
                        "content": `Jsi učitel. Z textu vytvoř 3 otázky (A,B,C) v češtině. Správnou odpověď označ pomocí <strong>. Vrať pouze čisté HTML (h3, ul, li). Text: ${documentText.substring(0, 7000)}`
                    }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message || "Chyba API");

            const aiContent = data.choices[0].message.content;
            output.innerHTML = aiContent.replace(/```html|```/g, '').trim();
            output.classList.remove('hidden');
            status.innerHTML = "✅ Kvíz byl úspěšně vygenerován!";

        } catch (err) {
            console.error("Chyba aplikace:", err);
            status.innerHTML = `<div class="error">❌ Chyba: ${err.message}</div>`;
        } finally {
            genBtn.disabled = false;
        }
    };
</script>

</body>
</html>
