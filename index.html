<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>AI Kvízovač - Školní verze</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .hidden { display: none; }
        
        /* Styl pro zadání klíče */
        #setup-box { text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Styl pro hlavní aplikaci */
        .upload-area { border: 2px dashed #3b82f6; padding: 30px; text-align: center; border-radius: 10px; background: #eff6ff; cursor: pointer; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        button:hover { background: #2563eb; }
        #output { margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; }
        .status { text-align: center; margin: 10px 0; font-weight: bold; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-box">
        <h2>Nastavení aplikace</h2>
        <p>Pro fungování vložte svůj <strong>OpenRouter API Key</strong>:</p>
        <input type="text" id="apiKeyInput" placeholder="sk-or-v1-...">
        <button id="saveKeyBtn">Spustit aplikaci</button>
        <p style="font-size: 0.8em; color: #666;">Klíč bude uložen pouze ve vašem prohlížeči.</p>
    </div>

    <div id="app-box" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🧠 AI Kvízovač</h2>
            <button id="resetBtn" style="width: auto; padding: 5px 10px; margin: 0; font-size: 0.7em; background: #ef4444;">Smazat klíč</button>
        </div>
        <hr>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p>Klikněte pro nahrání souboru (PDF, DOCX)</p>
            <input type="file" id="fileInput" accept=".pdf,.docx" style="display:none">
        </div>
        <div id="fileName" style="text-align: center; margin-top: 5px; font-size: 0.9em;"></div>
        <button id="generateBtn">Vygenerovat kvíz</button>
        <div id="status" class="status"></div>
        <div id="output" class="hidden"></div>
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem('openrouter_key');

    const setupBox = document.getElementById('setup-box');
    const appBox = document.getElementById('app-box');
    const status = document.getElementById('status');
    const output = document.getElementById('output');

    // Kontrola, zda už klíč máme
    if (API_KEY) {
        showApp();
    }

    // Uložení klíče
    document.getElementById('saveKeyBtn').onclick = () => {
        const val = document.getElementById('apiKeyInput').value.trim();
        if (val.startsWith('sk-or-')) {
            localStorage.setItem('openrouter_key', val);
            API_KEY = val;
            showApp();
        } else {
            alert("Tohle nevypadá jako platný OpenRouter klíč.");
        }
    };

    // Reset klíče (odhlášení)
    document.getElementById('resetBtn').onclick = () => {
        localStorage.removeItem('openrouter_key');
        location.reload();
    };

    function showApp() {
        setupBox.classList.add('hidden');
        appBox.classList.remove('hidden');
    }

    document.getElementById('fileInput').onchange = (e) => {
        const name =
